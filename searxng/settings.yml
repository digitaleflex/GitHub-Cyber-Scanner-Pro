# Fichier de configuration minimal pour activer l'API JSON dans SearXNG
use_default_settings: true

general:
  debug: false
  instance_name: "Cyber OSINT Scanner Engine"
  
search:
  safe_search: 0 # 0 = Off (Nécessaire pour l'OSINT cyber et les Dorks)
  autocomplete: ""
  default_lang: "en-US"
  formats:
    - html
    - json   # <-- Obligatoire pour interagir avec le script Python
    - csv

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "cyber_secret_default_key" # Écrasé par SEARXNG_SECRET dans docker-compose
  base_url: false # auto

engines:
  - name: google
    engine: google
    shortcut: go
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
