version: '3.8'
services:
  # Base Relationnelle de Métadonnées (PostgreSQL)
  cyber-db:
    image: postgres:16-alpine
    container_name: cyber_meta_db
    restart: always
    environment:
      POSTGRES_USER: cyber_master
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cyberpass}
      POSTGRES_DB: cyber_knowledge
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyber_master -d cyber_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Moteur Sémantique et Vectoriel (Qdrant)
  cyber-vector-engine:
    image: qdrant/qdrant:latest
    container_name: cyber_qdrant_engine
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  # File d'Attente et Cache (Redis)
  cyber-queue:
    image: redis:7-alpine
    container_name: cyber_redis_queue
    restart: always
    volumes:
      - ./redis_data:/data

  # Aspirateur Web OSINT (SearXNG)
  searxng:
    image: searxng/searxng:latest
    container_name: cyber_osint_search
    restart: always
    volumes:
      - ./searxng:/etc/searxng
    ports:
      - "8080:8080"

  # --- LES AGENTS INTELLIGENTS (CELERY WORKERS) ---
  
  # Agent 1 : Dédié au téléchargement et à la découverte (Asynchrone GitHub)
  worker-harvester:
    build: .
    command: celery -A tasks worker --queue=harvester -c 4 -l info
    restart: always
    env_file: .env
    depends_on:
      - cyber-queue

  # Agent 2 : Dédié au NLP, IA multilingue et insertion Qdrant (Lourd CPU)
  worker-nlp:
    build: .
    command: celery -A tasks worker --queue=nlp -c 2 -l info
    restart: always
    env_file: .env
    depends_on:
      - cyber-queue
      - cyber-vector-engine

  # Agent 3 : Dédié aux audits locaux éphémères (Trivy / Semgrep / Gitleaks)
  worker-security:
    build: .
    command: celery -A tasks worker --queue=security -c 1 -l info
    restart: always
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Pour piloter Trivy/Semgrep locaux
    depends_on:
      - cyber-queue

  # --- SUPERVISION VISUELLE ---
  
  # Dashboard Celery (Flower)
  flower:
    image: mher/flower:latest
    container_name: cyber_celery_flower
    restart: always
    ports:
      - "5555:5555" # Interface web pour voir vos tâches en cours
    environment:
      - CELERY_BROKER_URL=redis://cyber-queue:6379/0
      - FLOWER_BASIC_AUTH=${FLOWER_AUTH:-admin:cyberadmin}
    depends_on:
      - cyber-queue

volumes:
  postgres_data:
  qdrant_data:
  redis_data: