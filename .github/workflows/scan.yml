name: CyberScan Weekly

on:
  schedule:
    - cron: '0 8 * * 1'  # Chaque lundi a 8h UTC
  workflow_dispatch:      # Pour lancer manuellement

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scan
        run: python scripts/scan.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate report
        run: python scripts/report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: cyberreport-${{ github.run_number }}
          path: reports/
          retention-days: 90
